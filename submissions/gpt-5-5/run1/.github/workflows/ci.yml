name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    env:
      RUN_TESTCONTAINERS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore CreditCardService.slnx
      - name: Build
        run: dotnet build CreditCardService.slnx --no-restore --configuration Release
      - name: Format
        run: dotnet format CreditCardService.slnx --verify-no-changes --no-restore
      - name: Test with coverage
        run: dotnet test CreditCardService.slnx --no-build --configuration Release --collect:"XPlat Code Coverage" --settings coverlet.runsettings
      - name: Vulnerability audit
        run: dotnet list CreditCardService.slnx package --vulnerable --include-transitive
