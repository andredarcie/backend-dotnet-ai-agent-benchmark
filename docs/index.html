<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Backend .NET — AI Agent Benchmark</title>
  <meta name="description" content="One prompt, every AI model, one automated score. A .NET 10 credit-card API benchmark graded across 13 weighted quality categories.">
  <meta name="color-scheme" content="light dark">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">

  <script>
    (function () {
      try {
        var t = localStorage.getItem('bench-theme');
        if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
        var l = localStorage.getItem('bench-lang') || (navigator.language || 'en').slice(0,2).toLowerCase();
        document.documentElement.setAttribute('lang', (l === 'pt') ? 'pt' : 'en');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>

  <header class="nav" id="nav">
    <a class="nav__brand" href="#overview" aria-label="Backend .NET AI Agent Benchmark">
      <span class="nav__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 15l3-4 3 3 4-6"/>
        </svg>
      </span>
      <span class="nav__name">backend<span class="nav__dot">·</span>bench</span>
    </a>

    <nav class="nav__links" aria-label="Sections">
      <a href="#overview" data-i18n="nav.leaderboard"></a>
      <a href="#criteria" data-i18n="nav.criteria"></a>
      <a href="#how" data-i18n="nav.how"></a>
      <a href="details.html" data-i18n="nav.details"></a>
    </nav>

    <div class="nav__actions">
      <button class="btn-ghost" id="langToggle" type="button" title="PT / EN"><span id="langLabel">EN</span></button>
      <button class="btn-ghost btn-icon" id="themeToggle" type="button" data-i18n-title="theme.toggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8z"/></svg>
      </button>
      <a class="btn-ghost btn-icon" id="ghLink" href="https://github.com/andredarcie/backend-dotnet-ai-agent-benchmark" target="_blank" rel="noopener" aria-label="GitHub">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.9 10.9c.6.1.8-.2.8-.5v-2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17.3 4.7 18.3 5 18.3 5c.6 1.6.2 2.8.1 3.1.7.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.6.8.5A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5z"/></svg>
      </a>
    </div>
  </header>

  <main>
    <!-- ===================== LEADERBOARD (the hero) ===================== -->
    <section class="hero hero--lead" id="overview">
      <div class="hero__lead">
        <p class="eyebrow" data-i18n="hero.kicker"></p>
        <h1 class="hero__title hero__title--lb" data-i18n="nav.leaderboard"></h1>
        <p class="hero__lede lede" data-i18n="hero.lede"></p>
        <p class="hero__byline" data-i18n="hero.byline"></p>
        <div class="hero__cta">
          <a class="btn-line" href="#how" data-i18n="hero.cta.how"></a>
          <a class="btn-line" href="details.html" data-i18n="hero.details"></a>
        </div>
      </div>

      <div class="lb__meta" id="leaderboardMeta"></div>
      <div class="lb" id="leaderboardMount"></div>
    </section>

    <!-- ======================= THE 13 CRITERIA ======================= -->
    <section class="section section--alt" id="criteria">
      <div class="section__head">
        <p class="eyebrow" data-i18n="criteria.eyebrow"></p>
        <h2 class="section__title" data-i18n="criteria.title"></h2>
        <p class="lede" data-i18n="criteria.lede"></p>
      </div>

      <div class="criteria__toolbar">
        <div class="seg" role="group" aria-label="sort">
          <button class="seg__btn is-active" id="sortWeight" data-i18n="criteria.sortWeight"></button>
          <button class="seg__btn" id="sortOrder" data-i18n="criteria.sortOrder"></button>
        </div>
        <div class="autolegend" id="autoLegendMini"></div>
      </div>

      <ol class="rubric" id="criteriaList"></ol>
    </section>

    <!-- ======================= HOW IT WORKS ======================= -->
    <section class="section" id="how">
      <div class="section__head">
        <p class="eyebrow" data-i18n="how.eyebrow"></p>
        <h2 class="section__title" data-i18n="how.title"></h2>
        <p class="lede" data-i18n="how.lede"></p>
      </div>

      <div class="how__pipeline" id="howPipeline"></div>

      <div class="how__passes">
        <h3 class="how__passestitle" data-i18n="how.passes.title"></h3>
        <div class="passes">
          <article class="pass-card">
            <span class="pass-card__n">1</span>
            <h3 data-i18n="how.pass1.title"></h3>
            <p data-i18n="how.pass1.body"></p>
          </article>
          <article class="pass-card pass-card--review">
            <span class="pass-card__n">2</span>
            <h3 data-i18n="how.pass2.title"></h3>
            <p data-i18n="how.pass2.body"></p>
          </article>
        </div>
      </div>

      <div class="modes">
        <article class="mode-card mode-card--light">
          <span class="mode-card__tag">light</span>
          <h3 data-i18n="how.static.title"></h3>
          <p data-i18n="how.static.body"></p>
        </article>
        <article class="mode-card mode-card--deep">
          <span class="mode-card__tag">deep</span>
          <h3 data-i18n="how.deep.title"></h3>
          <p data-i18n="how.deep.body"></p>
        </article>
      </div>
      <p class="callout" data-i18n="how.note"></p>

      <div class="how__pair">
        <article class="feature">
          <div class="feature__ic" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7h16M4 12h10M4 17h13"/><circle cx="18.5" cy="12" r="1.6" fill="currentColor" stroke="none"/></svg>
          </div>
          <h3 data-i18n="how.roslyn.title"></h3>
          <p data-i18n="how.roslyn.body"></p>
        </article>
        <article class="feature">
          <div class="feature__ic" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3a9 9 0 1 0 9 9"/><path d="M12 8v4l3 2"/><path d="M17 3l4 4-4 0z" fill="currentColor" stroke="none"/></svg>
          </div>
          <h3 data-i18n="how.oracle.title"></h3>
          <p data-i18n="how.oracle.body"></p>
        </article>
      </div>

      <p class="section__more">
        <a class="btn-line" href="details.html" data-i18n="hero.details"></a>
      </p>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__grid">
      <div class="footer__brand">
        <span class="nav__name">backend<span class="nav__dot">·</span>bench</span>
        <p class="footer__author" data-i18n="footer.author"></p>
        <p data-i18n="footer.tagline"></p>
        <p class="footer__built" data-i18n="footer.built"></p>
      </div>
      <div class="footer__col">
        <h4 data-i18n="footer.add.title"></h4>
        <p data-i18n="footer.add.body"></p>
        <p class="footer__code"><code data-i18n="footer.regen"></code><code>./docs/generate-data.ps1</code></p>
      </div>
      <div class="footer__col">
        <h4 data-i18n="footer.links"></h4>
        <ul class="footer__links">
          <li><a href="details.html" data-i18n="nav.details"></a></li>
          <li><a href="https://github.com/andredarcie/backend-dotnet-ai-agent-benchmark/blob/main/PROMPT.md" target="_blank" rel="noopener" data-i18n="footer.link.prompt"></a></li>
          <li><a href="https://github.com/andredarcie/backend-dotnet-ai-agent-benchmark/blob/main/EVALUATION-CRITERIA.md" target="_blank" rel="noopener" data-i18n="footer.link.criteria"></a></li>
          <li><a href="https://github.com/andredarcie/backend-dotnet-ai-agent-benchmark/blob/main/METHODOLOGY.md" target="_blank" rel="noopener" data-i18n="footer.link.methodology"></a></li>
        </ul>
      </div>
    </div>
  </footer>

  <script src="./data/data.js"></script>
  <script src="./assets/content.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
