# Single-command benchmark harness.
#
#   cd evaluator-dotnet/harness
#   docker compose up --build --exit-code-from evaluator
#
# It boots the submission (app + Postgres + Kafka) from its own compose file and runs the evaluator
# against the LIVE system, writing the report to ./results. Pick the submission via TARGET in .env.
#
# There is no DAST/SAST sidecar any more: OWASP ZAP used to run here as a one-shot the evaluator had to
# WAIT for (depends_on: service_completed_successfully), which serialized 3-5 minutes onto every grading
# run to produce one near-identical alert list per submission. What proves the system works is the live
# contract oracle plus the real event on the topic — both of which run inside the evaluator.

name: bench-harness

# Bring up the submission under test (publishes the app on host port 8080, Kafka on 29092).
include:
  - path: ../../submissions/${TARGET}/docker-compose.yml

services:
  # Tails the `transactions` topic for the whole run and records key<TAB>value per message, so the
  # evaluator can confirm a real event was published (and keyed by id). Uses the in-network broker
  # listener (kafka:9092) the submission advertises; writes to the shared ingest dir.
  kafka-check:
    image: edenhill/kcat:1.7.1
    entrypoint: ["sh", "-c"]
    command:
      - |
        : > /shared/kafka.events
        for i in $$(seq 1 90); do kcat -b $${BENCH_KAFKA_BOOTSTRAP} -L >/dev/null 2>&1 && break || sleep 2; done
        echo '#connected' >> /shared/kafka.events
        # Keep tailing for the whole run. If the `transactions` topic does not exist yet, kcat exits
        # immediately; loop-and-retry instead of dying (a single early exit would otherwise abort the
        # whole compose project). Once the topic exists this latches on and tails until teardown.
        while true; do
          kcat -C -b $${BENCH_KAFKA_BOOTSTRAP} -t transactions -o beginning -u -q -f '%k\t%s\n' >> /shared/kafka.events 2>/dev/null
          sleep 3
        done
    environment:
      BENCH_KAFKA_BOOTSTRAP: ${BENCH_KAFKA_BOOTSTRAP:-kafka:9092}
    volumes:
      - ./shared:/shared:rw
    restart: "no"

  # The evaluator: Roslyn AST + dotnet (build/test/coverage/format/vulnerable) + gitleaks + hadolint +
  # the live probes (health/metrics, OpenAPI) and the contract oracle. It waits for /health itself, so it
  # needs no depends_on gate; drive teardown by ITS completion:
  #
  #   docker compose up --build --exit-code-from evaluator
  #
  # The submission's suite is UNIT-ONLY (the task rules out Testcontainers and WebApplicationFactory), so
  # no Docker socket is mounted here and `dotnet test` boots no sibling containers — it runs in seconds.
  evaluator:
    build:
      context: ..
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      BENCH_BASE_URL: ${BENCH_BASE_URL}
      BENCH_INGEST_DIR: /shared
      BENCH_OPENAPI_PATH: ${BENCH_OPENAPI_PATH}
    volumes:
      - ../../submissions/${TARGET}:/target:rw   # rw so `dotnet test/restore` can write bin/obj
      - ./results:/results:rw
      - ./shared:/shared:rw
    command: ["/target", "--deep", "--ingest", "/shared", "--output", "/results"]
    restart: "no"
