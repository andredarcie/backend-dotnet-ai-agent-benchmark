name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test (unit + integration, with coverage)
        run: dotnet test --no-build -c Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: TestResults/**/coverage.cobertura.xml

  docker-smoke-test:
    runs-on: ubuntu-latest
    needs: build-test-lint
    steps:
      - uses: actions/checkout@v4

      - name: Boot the full stack
        run: docker compose up -d --build

      - name: Wait for the API to become healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then exit 0; fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs
          exit 1

      - name: Smoke-test the credit-card and transaction flow
        run: |
          set -e
          card=$(curl -sf -X POST http://localhost:8080/api/credit-cards \
            -H "Content-Type: application/json" \
            -d '{"cardholderName":"CI Bot","cardNumber":"4111111111111111","brand":"VISA","creditLimit":1000}')
          id=$(echo "$card" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          curl -sf -X POST http://localhost:8080/api/transactions \
            -H "Content-Type: application/json" \
            -d "{\"creditCardId\":$id,\"amount\":9.99,\"merchant\":\"CI Store\"}"

      - name: Tear down
        if: always()
        run: docker compose down -v
