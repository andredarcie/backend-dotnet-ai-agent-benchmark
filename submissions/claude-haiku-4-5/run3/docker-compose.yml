services:
  postgres:
    image: postgres:16-alpine
    container_name: creditcard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: creditcard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creditcard-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: creditcard-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - "29092:29092"
    networks:
      - creditcard-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: creditcard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - creditcard-network

  api:
    build: .
    container_name: creditcard-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=creditcard;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "kafka:9092"
    ports:
      - "8080:8080"
    networks:
      - creditcard-network

networks:
  creditcard-network:
    driver: bridge
